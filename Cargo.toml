[workspace]
members = [
    "core",
    "ffi",
    "cli",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/tfuent1/ripple"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
uuid = { version = "1.6", features = ["v4"] }
rmp-serde = "1.1"
rusqlite = { version = "0.31", features = ["bundled"] }
